name: Bug Report
description: File a bug report to help us improve GARY
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please check existing issues.
  - type: input
    id: os
    attributes:
      label: "macOS Version"
      placeholder: "e.g., 14.3"
    validations:
      required: true
  - type: dropdown
    id: chip
    attributes:
      label: "Apple Silicon Chip"
      options:
        - "M1"
        - "M2"
        - "M3"
        - "M4"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: "Python Version"
      description: "Output of `python3 --version`"
      placeholder: "Python 3.11.x"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "What happened?"
      description: "Describe the bug."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
      description: "What did you expect to happen?"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "Reproduction Steps"
      description: "How can we reproduce the error?"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "Logs"
      description: "pytest output or Server log (gary/logs/ or terminal output)"
      render: shell
