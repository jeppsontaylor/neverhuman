name: 🐛 Bug Report
description: Create a report to help us improve GARY
title: "[BUG] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug in NeverHuman / GARY!
  - type: input
    id: version
    attributes:
      label: Version / Commit Hash
      description: What version of GARY are you running? (Output of `git rev-parse HEAD`)
    validations:
      required: true
  - type: dropdown
    id: hardware
    attributes:
      label: Apple Silicon Hardware
      description: What hardware are you running on?
      options:
        - M1 (8GB / 16GB)
        - M2 (16GB / 24GB)
        - M3 Pro / Max
        - M4 Pro / Max
        - Other Apple Silicon
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `install.sh`
        2. Speak '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Terminal Logs
      description: Paste any relevant terminal logs (from `server.py`).
      render: markdown
